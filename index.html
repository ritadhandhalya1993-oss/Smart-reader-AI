<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Reader AI Pro</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    :root { 
      --bg: #030712; --card: rgba(17, 24, 39, 0.8);
      --primary: #38bdf8; --accent: #818cf8; --success: #10b981;
      --danger: #ef4444; --text: #f9fafb;
    }

    /* Professional Splash Screen */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: transform 0.7s cubic-bezier(0.77, 0, 0.175, 1);
    }
    #splash-screen img { width: 100%; max-width: 500px; border-radius: 15px; box-shadow: 0 0 40px rgba(56,189,248,0.2); }

    body { 
      background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif;
      margin: 0; padding: 15px; background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #030712 100%);
    }

    .glass-card { 
      background: var(--card); backdrop-filter: blur(16px); 
      border: 1px solid rgba(255,255,255,0.1); border-radius: 28px;
      padding: 25px; margin-bottom: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    h2 { font-size: 20px; margin: 0 0 20px; text-align: center; letter-spacing: 0.5px;
         background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* Premium Action Buttons */
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .neon-btn { 
      padding: 20px 10px; border-radius: 20px; border: none; font-weight: 700; color: white;
      cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .btn-scan { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
    .btn-voice { background: linear-gradient(135deg, #8b5cf6, #d946ef); position: relative; overflow: hidden; }
    
    .listening-pulse { position: absolute; width: 100%; height: 100%; background: rgba(239,68,68,0.4); animation: pulse 1.5s infinite; display: none; }
    @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.5); } }

    /* Results Table */
    .res-row { display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
    .res-row input { background: transparent; border: none; color: white; font-size: 15px; width: 45%; outline: none; }

    /* Budget Visuals */
    .progress-container { margin-bottom: 20px; }
    .label-group { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: #9ca3af; }
    .progress-track { background: #1f2937; height: 8px; border-radius: 10px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 10px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }

    #status-text { text-align: center; font-size: 12px; color: var(--primary); margin-top: 15px; min-height: 18px; }
  </style>
</head>
<body>

<div id="splash-screen">
  <img src="1001047076.png" onerror="this.src='banner.png'">
</div>

<div class="glass-card">
  <h2>🤖 Smart AI Assistant</h2>
  <div class="btn-grid">
    <button class="neon-btn btn-scan" onclick="document.getElementById('billInput').click()">
      <span style="font-size:24px;">📸</span>
      <span>Scan Bill</span>
    </button>
    <button id="voiceBtn" class="neon-btn btn-voice" onclick="startVoiceEntry()">
      <div class="listening-pulse" id="pulse"></div>
      <span style="font-size:24px;">🎙️</span>
      <span>AI Voice</span>
    </button>
  </div>
  <input type="file" id="billInput" accept="image/*" style="display:none" onchange="aiScan(this)">
  <div id="status-text">System Ready...</div>
</div>

<div id="resultCard" class="glass-card" style="display:none;">
  <h2>🔍 Analysis Results</h2>
  <div id="itemsContainer"></div>
  <button onclick="commitData()" style="width:100%; padding:18px; border-radius:18px; border:none; background:var(--success); color:white; font-weight:800; margin-top:10px; cursor:pointer;">CONFIRM & SAVE</button>
</div>

<div class="glass-card">
  <h2>📊 Live Budget Analytics</h2>
  <div id="analyticsList"></div>
</div>

<script>
let expenses = JSON.parse(localStorage.getItem("ai_expenses_v1")) || [];
let limits = {"Grocery": 5000, "Clothes": 3000, "Medical": 1000, "Fuel": 2000, "Education": 2000, "Others": 2000};

// 1. Smooth Splash Transition
window.addEventListener('load', () => {
  setTimeout(() => {
    const s = document.getElementById('splash-screen');
    s.style.transform = 'translateY(-100%)';
    setTimeout(() => s.style.display = 'none', 700);
  }, 2500);
  updateUI();
});

// 2. AI Voice Input (Gujarati/English Recognition)
function startVoiceEntry() {
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Speech) return alert("બ્રાઉઝર વોઈસ સપોર્ટ કરતું નથી.");
  
  const recog = new Speech();
  recog.lang = 'gu-IN';
  
  recog.onstart = () => {
    document.getElementById('pulse').style.display = 'block';
    document.getElementById('status-text').innerText = "Listening for (Item name + Amount)...";
  };
  
  recog.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('status-text').innerText = "Detected: " + transcript;
    
    const num = transcript.match(/\d+/);
    if(num) {
      const item = transcript.replace(num[0], "").trim() || "Voice entry";
      showEditor([{ name: item, amount: parseFloat(num[0]) }]);
    }
  };
  
  recog.onend = () => document.getElementById('pulse').style.display = 'none';
  recog.start();
}

// 3. AI OCR Scanning
async function aiScan(input) {
  if(!input.files[0]) return;
  const status = document.getElementById('status-text');
  status.innerText = "⏳ AI is reading your receipt...";
  
  try {
    const worker = await Tesseract.createWorker();
    await worker.loadLanguage('eng+guj');
    await worker.initialize('eng+guj');
    const { data: { lines } } = await worker.recognize(input.files[0]);
    
    let found = [];
    lines.forEach(l => {
      const m = l.text.match(/(\d+[\.]\d{2})|(\s\d{2,6})$/);
      if(m) found.push({ name: l.text.replace(m[0], "").trim(), amount: parseFloat(m[0]) });
    });
    await worker.terminate();
    status.innerText = found.length > 0 ? "Scan Success!" : "No data found.";
    if(found.length > 0) showEditor(found);
  } catch(e) { status.innerText = "Error: " + e; }
}

function showEditor(items) {
  window.tempData = items;
  const container = document.getElementById('itemsContainer');
  document.getElementById('resultCard').style.display = 'block';
  container.innerHTML = items.map((it, i) => `
    <div class="res-row">
      <input type="text" value="${it.name}" onchange="window.tempData[${i}].name=this.value">
      <input type="number" value="${it.amount}" onchange="window.tempData[${i}].amount=parseFloat(this.value)" style="text-align:right; color:var(--primary); font-weight:bold;">
    </div>
  `).join('');
}

function commitData() {
  const d = new Date().toISOString().split('T')[0];
  window.tempData.forEach(it => { if(it.amount > 0) expenses.push({date: d, category: "Others", ...it}); });
  localStorage.setItem("ai_expenses_v1", JSON.stringify(expenses));
  document.getElementById('resultCard').style.display = 'none';
  updateUI();
  document.getElementById('status-text').innerText = "Data Securely Saved.";
}

function updateUI() {
  const list = document.getElementById('analyticsList');
  let totals = {};
  expenses.forEach(e => totals[e.category] = (totals[e.category] || 0) + e.amount);

  list.innerHTML = Object.keys(limits).map(cat => {
    const s = totals[cat] || 0, l = limits[cat], p = Math.min((s/l)*100, 100);
    const color = s > l ? 'var(--danger)' : (p > 80 ? '#fbbf24' : 'var(--success)');
    return `
      <div class="progress-container">
        <div class="label-group"><span>${cat}</span><span>₹${s.toFixed(0)} / ${l}</span></div>
        <div class="progress-track"><div class="progress-bar" style="width:${p}%; background:${color}"></div></div>
      </div>`;
  }).join('');
}
</script>
</body>
</html>
